<app-header></app-header>

<main>
  <div id="dashboard">
    <app-dashboard-item
      title="Server Status"
      [icon]="{ src: 'status.png', alt: 'A server status symbol' }"
    >
      <app-server-status />
    </app-dashboard-item>
    <app-dashboard-item
      title="Traffic"
      [icon]="{ src: 'globe.png', alt: 'A globe symbol' }"
    >
      <app-traffic />
    </app-dashboard-item>
    <app-dashboard-item
      title="Tickets"
      [icon]="{ src: 'list.png', alt: 'A list of items symbol' }"
    >
      <app-tickets />
    </app-dashboard-item>
  </div>
</main>
